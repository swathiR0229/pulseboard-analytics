<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard | Swathi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container header-row">
      <h1>Growth Analytics</h1>
      <div class="controls">
        <label>
          Range
          <select id="daysSelect">
            <option value="7">7 days</option>
            <option value="14">14 days</option>
            <option value="30">30 days</option>
          </select>
        </label>
        <button id="simulateBtn">Simulate Next Day</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="kpis">
      <article class="kpi"><h2>Total Signups</h2><p id="kpiSignups">-</p></article>
      <article class="kpi"><h2>Total Sales</h2><p id="kpiSales">-</p></article>
      <article class="kpi"><h2>Total Revenue</h2><p id="kpiRevenue">-</p></article>
      <article class="kpi"><h2>Conversion Rate</h2><p id="kpiConversion">-</p></article>
    </section>

    <section class="chart-card">
      <h2>Revenue Trend</h2>
      <canvas id="revenueChart" width="1000" height="300"></canvas>
      <p id="status" class="status"></p>
    </section>

    <section class="table-card">
      <h2>Daily Metrics</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Date</th><th>Signups</th><th>Sales</th><th>Revenue</th></tr>
          </thead>
          <tbody id="metricsTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
